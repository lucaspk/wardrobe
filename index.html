<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guarda-roupa</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>Guarda-roupa</h1>
      <p class="subtitle">Combinações de cor entre camisa, calça e calçado</p>
      <p class="header-note">Se a combinação ficou boa, o conceito vale para outras peças e calçados — polo, short, bota, tênis… Não precisa gerar cada variação.</p>
      <nav class="view-tabs" role="tablist" aria-label="Modo de visualização">
        <button type="button" class="view-tab" id="view-combinator" role="tab" aria-selected="false" aria-controls="panel-combinator">
          <svg class="view-tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
            <path d="M12 3a2.5 2.5 0 0 1 2.45 2H14a3.5 3.5 0 1 0-4 0H9.55A2.5 2.5 0 0 1 12 3z"/>
            <path d="M5.5 10.5h13l-5.3 9.5H10.8L5.5 10.5z"/>
          </svg>
          <span>Combinador</span>
        </button>
        <button type="button" class="view-tab active" id="view-gallery" role="tab" aria-selected="true" aria-controls="panel-gallery">
          <svg class="view-tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
            <rect x="3" y="3" width="7" height="7" rx="1.5"/>
            <rect x="14" y="3" width="7" height="7" rx="1.5"/>
            <rect x="3" y="14" width="7" height="7" rx="1.5"/>
            <rect x="14" y="14" width="7" height="7" rx="1.5"/>
          </svg>
          <span>Galeria</span>
        </button>
      </nav>
    </header>

    <section id="panel-gallery" role="tabpanel">
      <div class="filters-section">
        <div class="filters">
          <label>
            Categoria
            <select id="filter-category">
              <option value="">Todas</option>
            </select>
          </label>
          <label>
            Cor
            <select id="filter-color">
              <option value="">Todas</option>
            </select>
          </label>
        </div>
      </div>

      <div class="gallery-section">
        <div id="gallery" class="gallery"></div>
      </div>
    </section>

    <section id="panel-combinator" class="hidden" role="tabpanel">
      <div class="combo-layout">
        <div class="combo-preview-frame">
          <img id="combo-preview-img" alt="Look gerado no GPT" hidden>
          <div id="combo-placeholder" class="combo-placeholder">
            <div class="combo-placeholder-figure">
              <div id="ph-camisa" class="ph-piece ph-camisa"></div>
              <div id="ph-calca" class="ph-piece ph-calca"></div>
              <div id="ph-calcado" class="ph-piece ph-calcado"></div>
            </div>
            <p class="combo-placeholder-text">Ainda não gerado</p>
          </div>
        </div>

        <div class="combo-meta">
          <p class="combo-label" id="combo-label"></p>
        </div>

        <div class="combo-controls">
          <div class="control-group">
            <div class="control-group-header">
              <h2>Camisa</h2>
              <span class="control-group-count" id="count-camisa"></span>
            </div>
            <div class="swatches" id="swatches-camisa"></div>
          </div>
          <div class="control-group">
            <div class="control-group-header">
              <h2>Calça</h2>
              <span class="control-group-count" id="count-calca"></span>
            </div>
            <div class="swatches" id="swatches-calca"></div>
          </div>
          <div class="control-group">
            <div class="control-group-header">
              <h2>Calçado</h2>
              <span class="control-group-count" id="count-calcado"></span>
            </div>
            <div class="swatches" id="swatches-calcado"></div>
          </div>
        </div>

        <div class="combo-footer">
          <div class="combo-actions">
            <button type="button" id="btn-combo-random" class="btn btn-primary">
              <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M16 3h5v5"/>
                <path d="M4 20l13-13"/>
                <path d="M21 16v5h-5"/>
                <path d="M15 15l6 6"/>
                <path d="M4 4l5 5"/>
              </svg>
              Aleatório
            </button>
            <button type="button" id="btn-combo-reset" class="btn btn-outline">Reset</button>
          </div>
        </div>
      </div>
    </section>
  </div>

  <div class="carousel-overlay hidden" id="carousel-overlay" role="dialog" aria-modal="true">
    <button type="button" class="carousel-close" id="carousel-close" aria-label="Fechar">×</button>
    <button type="button" class="carousel-nav carousel-prev" id="carousel-prev" aria-label="Anterior">‹</button>
    <button type="button" class="carousel-nav carousel-next" id="carousel-next" aria-label="Próximo">›</button>
    <div class="carousel-content">
      <div class="carousel-image-wrap">
        <img id="carousel-image" src="" alt="">
      </div>
      <div class="carousel-info" id="carousel-info"></div>
      <div class="carousel-counter" id="carousel-counter"></div>
    </div>
  </div>

  <script src="script.js"></script>
  <script src="combinator.js"></script>
</body>
</html>
